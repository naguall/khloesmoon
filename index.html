<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Khloe's Moon">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Khloe's Moon</title>
  <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0a1a;--surface:#111128;--surface2:#1a1a3a;--surface3:#222250;
      --accent:#7c6cff;--accent2:#a78bfa;--accent-glow:rgba(124,108,255,0.25);
      --gold:#d4a843;--gold-dim:rgba(212,168,67,0.2);
      --text:#e0e0f0;--text-dim:#7777a0;--text-dimmer:#555580;
      --danger:#ff6b6b;--success:#51cf66;--warn:#ffc107;
      --radius:14px;--radius-sm:10px;
    }
    html{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);color:var(--text);min-height:100dvh;
      overflow-x:hidden;-webkit-tap-highlight-color:transparent;
      padding-bottom:80px;
    }

    /* NAV BAR */
    .navbar{
      position:fixed;bottom:0;left:0;right:0;z-index:500;
      background:rgba(10,10,26,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1px solid rgba(124,108,255,0.12);
      display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px);
    }
    .nav-item{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      background:none;border:none;color:var(--text-dim);font-size:10px;
      font-weight:600;cursor:pointer;padding:6px 12px;transition:color .2s;
      letter-spacing:.3px;
    }
    .nav-item.active{color:var(--accent)}
    .nav-item svg{width:24px;height:24px;fill:currentColor}

    /* HEADER */
    .header{
      position:sticky;top:0;z-index:100;
      background:rgba(10,10,26,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      padding:14px 16px 10px;border-bottom:1px solid rgba(124,108,255,0.1);
      display:flex;align-items:center;justify-content:space-between;
    }
    .header h1{
      font-size:22px;font-weight:700;
      background:linear-gradient(135deg,var(--gold),#f0d78c);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .header-moon{font-size:14px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
    .header-moon .moon-icon{font-size:20px}

    /* VIEWS */
    .view{display:none;padding:12px 16px}
    .view.active{display:block}

    /* ============ LUNAR CALENDAR ============ */
    .lunar-today{
      background:linear-gradient(135deg,var(--surface),var(--surface2));
      border:1px solid rgba(212,168,67,0.2);border-radius:var(--radius);
      padding:16px;margin-bottom:14px;text-align:center;
    }
    .lunar-today .moon-visual{font-size:48px;margin-bottom:4px}
    .lunar-today .day-num{font-size:36px;font-weight:800;color:var(--gold)}
    .lunar-today .day-label{font-size:13px;color:var(--text-dim);margin-top:2px}
    .lunar-today .moon-info{
      display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:12px;color:var(--text-dim)
    }
    .lunar-today .moon-info span{display:flex;align-items:center;gap:4px}

    .lunar-phase-row{
      background:var(--surface);border-radius:var(--radius);
      margin-bottom:10px;overflow:hidden;
    }
    .phase-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .phase-header .phase-name{
      font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;
    }
    .phase-header .phase-dates{font-size:11px;color:var(--text-dim)}
    .phase-header .phase-sign{font-size:12px;color:var(--gold)}
    .phase-days{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:1px;padding:2px}
    .phase-days::-webkit-scrollbar{display:none}
    .lunar-day{
      min-width:56px;padding:8px 6px;text-align:center;flex-shrink:0;
      border-radius:var(--radius-sm);transition:background .2s;cursor:pointer;position:relative;
    }
    .lunar-day:hover{background:var(--surface2)}
    .lunar-day.today{background:var(--surface3);border:1px solid var(--accent)}
    .lunar-day .ld-num{font-size:18px;font-weight:700;color:var(--text)}
    .lunar-day .ld-greg{font-size:10px;color:var(--text-dim);margin-top:2px}
    .lunar-day .ld-weekday{font-size:9px;color:var(--text-dimmer);text-transform:uppercase}
    .lunar-day .ld-aspect{
      width:6px;height:6px;border-radius:50%;background:var(--gold);
      margin:4px auto 0;display:none;
    }
    .lunar-day.has-aspect .ld-aspect{display:block}
    .lunar-day.has-entry::after{
      content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;
      border-radius:50%;background:var(--accent);
    }

    .cycle-nav{
      display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:14px;
    }
    .cycle-nav button{
      background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius-sm);
      color:var(--text);padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600;
    }
    .cycle-nav .cycle-label{font-size:14px;font-weight:600;color:var(--gold);text-align:center;min-width:180px}

    /* Aspect popup */
    .day-detail{
      background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);
      padding:16px;margin-bottom:14px;display:none;
    }
    .day-detail.show{display:block}
    .day-detail h3{font-size:16px;margin-bottom:8px;color:var(--gold)}
    .day-detail .detail-row{font-size:13px;color:var(--text-dim);margin-bottom:4px;display:flex;gap:8px;align-items:center}
    .day-detail .detail-row .label{color:var(--text-dimmer);min-width:80px}
    .day-detail .actions{display:flex;gap:8px;margin-top:12px}
    .day-detail .actions button{
      flex:1;padding:10px;border:none;border-radius:var(--radius-sm);
      font-size:13px;font-weight:600;cursor:pointer;
    }
    .btn-journal{background:var(--accent);color:#fff}
    .btn-dream{background:var(--surface2);color:var(--accent);border:1px solid var(--accent) !important}

    /* ============ DIARY / DREAMS ============ */
    .entries-header{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
    }
    .entries-header h2{font-size:18px;font-weight:700}
    .add-btn{
      background:var(--accent);color:#fff;border:none;border-radius:50%;
      width:40px;height:40px;font-size:22px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 16px var(--accent-glow);
    }
    .search-bar{
      width:100%;padding:10px 14px;border:1px solid var(--surface2);border-radius:var(--radius-sm);
      background:var(--surface);color:var(--text);font-size:14px;margin-bottom:12px;outline:none;
    }
    .search-bar:focus{border-color:var(--accent)}

    .entry-card{
      background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;
      position:relative;cursor:pointer;transition:all .2s;
    }
    .entry-card:active{transform:scale(0.98)}
    .entry-card .entry-date{font-size:11px;color:var(--text-dim);margin-bottom:4px;display:flex;align-items:center;gap:6px}
    .entry-card .entry-lunar{color:var(--gold);font-size:11px}
    .entry-card .entry-title{font-size:15px;font-weight:600;margin-bottom:4px}
    .entry-card .entry-preview{font-size:13px;color:var(--text-dim);line-height:1.4;
      max-height:42px;overflow:hidden;white-space:pre-wrap}
    .entry-card .entry-mood{position:absolute;top:12px;right:12px;font-size:20px}

    .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim)}
    .empty-state .emoji{font-size:48px;margin-bottom:10px}

    /* ============ EDITOR MODAL ============ */
    .editor-overlay{
      position:fixed;inset:0;z-index:600;background:var(--bg);
      display:none;flex-direction:column;
    }
    .editor-overlay.show{display:flex}
    .editor-top{
      display:flex;justify-content:space-between;align-items:center;padding:14px 16px;
      border-bottom:1px solid var(--surface2);
    }
    .editor-top button{background:none;border:none;color:var(--text);font-size:15px;cursor:pointer;padding:6px 10px;font-weight:600}
    .editor-top .save-btn{color:var(--accent)}
    .editor-top .delete-btn{color:var(--danger)}
    .editor-body{flex:1;overflow-y:auto;padding:16px}
    .editor-body input,.editor-body textarea,.editor-body select{
      width:100%;padding:12px;border:1px solid var(--surface2);border-radius:var(--radius-sm);
      background:var(--surface);color:var(--text);font-size:15px;font-family:inherit;outline:none;
      margin-bottom:12px;
    }
    .editor-body textarea{min-height:200px;resize:vertical;line-height:1.6}
    .editor-body input:focus,.editor-body textarea:focus{border-color:var(--accent)}
    .editor-body label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;font-weight:600}
    .mood-picker{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .mood-picker button{
      font-size:24px;background:var(--surface);border:2px solid var(--surface2);
      border-radius:var(--radius-sm);padding:8px 10px;cursor:pointer;transition:all .2s;
    }
    .mood-picker button.selected{border-color:var(--accent);background:var(--surface2)}

    .dictate-btn{
      display:flex;align-items:center;gap:8px;
      background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);
      color:var(--text);padding:10px 16px;font-size:13px;cursor:pointer;margin-bottom:12px;font-weight:600;
    }
    .dictate-btn.recording{background:rgba(255,107,107,0.15);border-color:var(--danger);color:var(--danger)}
    .dictate-btn svg{width:18px;height:18px;fill:currentColor}

    .lunar-tag{
      display:inline-flex;align-items:center;gap:4px;
      background:var(--gold-dim);color:var(--gold);border-radius:6px;
      padding:4px 10px;font-size:12px;font-weight:600;margin-bottom:12px;
    }

    /* DAY DETAIL MODAL */
    .day-modal-overlay{
      position:fixed;inset:0;z-index:550;background:rgba(0,0,0,0.6);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:none;align-items:flex-end;justify-content:center;
    }
    .day-modal-overlay.show{display:flex}
    .day-modal{
      background:var(--surface);border-radius:20px 20px 0 0;
      padding:20px 16px 36px;width:100%;max-width:500px;max-height:80dvh;overflow-y:auto;
    }
    .day-modal .handle{width:36px;height:4px;background:var(--text-dimmer);border-radius:2px;margin:0 auto 16px;opacity:.4}

    @media(min-width:500px){
      .view{max-width:500px;margin:0 auto}
      .header{max-width:540px;margin:0 auto}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Khloe's Moon</h1>
  <div class="header-moon">
    <span class="moon-icon" id="headerMoon"></span>
    <span id="headerPhase"></span>
  </div>
</div>

<!-- ============ CALENDAR VIEW ============ -->
<div class="view active" id="calendarView">
  <div class="lunar-today" id="lunarToday"></div>
  <div class="cycle-nav">
    <button onclick="changeCycle(-1)">&larr;</button>
    <div class="cycle-label" id="cycleLabel"></div>
    <button onclick="changeCycle(1)">&rarr;</button>
  </div>
  <div id="calendarGrid"></div>
</div>

<!-- ============ DIARY VIEW ============ -->
<div class="view" id="diaryView">
  <div class="entries-header">
    <h2>Diario</h2>
    <button class="add-btn" onclick="openEditor('diary')">+</button>
  </div>
  <input class="search-bar" placeholder="Buscar en el diario..." oninput="filterEntries('diary',this.value)">
  <div id="diaryList"></div>
</div>

<!-- ============ DREAMS VIEW ============ -->
<div class="view" id="dreamsView">
  <div class="entries-header">
    <h2>Diario de Sue&ntilde;os</h2>
    <button class="add-btn" onclick="openEditor('dream')">+</button>
  </div>
  <input class="search-bar" placeholder="Buscar en sue&ntilde;os..." oninput="filterEntries('dream',this.value)">
  <div id="dreamsList"></div>
</div>

<!-- DAY DETAIL MODAL -->
<div class="day-modal-overlay" id="dayModal" onclick="if(event.target===this)closeDayModal()">
  <div class="day-modal">
    <div class="handle"></div>
    <div id="dayModalContent"></div>
  </div>
</div>

<!-- EDITOR -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-top">
    <button onclick="closeEditor()">Cancelar</button>
    <button class="delete-btn" id="deleteEntryBtn" onclick="deleteEntry()" style="display:none">Eliminar</button>
    <button class="save-btn" onclick="saveEntry()">Guardar</button>
  </div>
  <div class="editor-body">
    <div class="lunar-tag" id="editorLunarTag"></div>
    <label>Titulo</label>
    <input type="text" id="editorTitle" placeholder="Titulo...">
    <label id="moodLabel">Estado de animo</label>
    <div class="mood-picker" id="moodPicker"></div>
    <label>Contenido</label>
    <button class="dictate-btn" id="dictateBtn" onclick="toggleDictation()">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      Dictar
    </button>
    <textarea id="editorContent" placeholder="Escribe aqui..."></textarea>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <button class="nav-item active" data-view="calendarView" onclick="switchView(this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2a10 10 0 0 1 0 20 8 8 0 0 0 0-20z"/></svg>
    Lunar
  </button>
  <button class="nav-item" data-view="diaryView" onclick="switchView(this)">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
    Diario
  </button>
  <button class="nav-item" data-view="dreamsView" onclick="switchView(this)">
    <svg viewBox="0 0 24 24"><path d="M12.1 2C6.5 2.1 2 6.6 2 12.2c0 2.8 1.1 5.3 3 7.1.5.5 1.1-.2.8-.8-.6-1.2-.9-2.5-.9-3.9C4.9 9.5 9 5.1 14 5c3.4-.1 6.3 1.7 7.8 4.4.3.5 1 .3 1-.3C22.2 5.1 17.6 1.9 12.1 2zM7.5 15a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zm9 0a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM12 19c2.2 0 4-1.1 4-2.5S14.2 14 12 14s-4 1.1-4 2.5S9.8 19 12 19z"/></svg>
    Sue&ntilde;os
  </button>
</nav>

<script>
// ===========================
// ASTRONOMY ENGINE HELPERS
// ===========================
const Astro = Astronomy;
const defaultObserver = new Astro.Observer(0, 0, 0);

function getMoonIllumination(date) {
  const illum = Astro.Illumination('Moon', date);
  return illum.phase_fraction * 100;
}

function getMoonPhaseAngle(date) {
  const illum = Astro.Illumination('Moon', date);
  return illum.phase_angle;
}

function getMoonPhaseName(date) {
  const illum = Astro.Illumination('Moon', date);
  const age = getLunarAge(date);
  if (age < 1.85) return 'Luna Nueva';
  if (age < 7.38) return 'Creciente';
  if (age < 9.23) return 'Cuarto Creciente';
  if (age < 13.77) return 'Gibosa Creciente';
  if (age < 16.61) return 'Luna Llena';
  if (age < 20.15) return 'Gibosa Menguante';
  if (age < 22.00) return 'Cuarto Menguante';
  if (age < 27.53) return 'Menguante';
  return 'Luna Nueva';
}

function getMoonEmoji(date) {
  const age = getLunarAge(date);
  if (age < 1.85) return '\u{1F311}';
  if (age < 7.38) return '\u{1F312}';
  if (age < 9.23) return '\u{1F313}';
  if (age < 13.77) return '\u{1F314}';
  if (age < 16.61) return '\u{1F315}';
  if (age < 20.15) return '\u{1F316}';
  if (age < 22.00) return '\u{1F317}';
  if (age < 27.53) return '\u{1F318}';
  return '\u{1F311}';
}

// Find previous new moon
function findPreviousNewMoon(date) {
  let search = Astro.SearchMoonPhase(0, new Date(date.getTime() - 35 * 86400000), 40);
  // Make sure it's before the given date
  while (search && search.date > date) {
    search = Astro.SearchMoonPhase(0, new Date(search.date.getTime() - 35 * 86400000), 40);
  }
  // Find the closest one before date
  let next = Astro.SearchMoonPhase(0, new Date(search.date.getTime() + 1 * 86400000), 40);
  while (next && next.date <= date) {
    search = next;
    next = Astro.SearchMoonPhase(0, new Date(next.date.getTime() + 1 * 86400000), 40);
  }
  return search ? search.date : date;
}

function findNextNewMoon(date) {
  const search = Astro.SearchMoonPhase(0, date, 40);
  if (search && search.date > date) return search.date;
  return Astro.SearchMoonPhase(0, new Date(date.getTime() + 1 * 86400000), 40)?.date || date;
}

function getLunarAge(date) {
  const prevNew = findPreviousNewMoon(date);
  return (date - prevNew) / 86400000;
}

// Get moon zodiac sign using ecliptic longitude
function getMoonZodiac(date) {
  const equ = Astro.Equator('Moon', date, defaultObserver, true, true);
  const ecl = Astro.Ecliptic(equ.vec);
  let lon = ecl.elon;
  if (lon < 0) lon += 360;
  const signs = ['Aries','Tauro','Geminis','Cancer','Leo','Virgo','Libra','Escorpio','Sagitario','Capricornio','Acuario','Piscis'];
  const symbols = ['\u2648','\u2649','\u264A','\u264B','\u264C','\u264D','\u264E','\u264F','\u2650','\u2651','\u2652','\u2653'];
  const idx = Math.floor(lon / 30) % 12;
  return { name: signs[idx], symbol: symbols[idx], degree: Math.floor(lon % 30) };
}

// Get sun zodiac
function getSunZodiac(date) {
  const equ = Astro.Equator('Sun', date, defaultObserver, true, true);
  const ecl = Astro.Ecliptic(equ.vec);
  let lon = ecl.elon;
  if (lon < 0) lon += 360;
  const signs = ['Aries','Tauro','Geminis','Cancer','Leo','Virgo','Libra','Escorpio','Sagitario','Capricornio','Acuario','Piscis'];
  const symbols = ['\u2648','\u2649','\u264A','\u264B','\u264C','\u264D','\u264E','\u264F','\u2650','\u2651','\u2652','\u2653'];
  const idx = Math.floor(lon / 30) % 12;
  return { name: signs[idx], symbol: symbols[idx] };
}

// Get planetary positions for aspects
function getPlanetaryAspects(date) {
  const planets = ['Mercury','Venus','Mars','Jupiter','Saturn'];
  const names = {Mercury:'Mercurio',Venus:'Venus',Mars:'Marte',Jupiter:'Jupiter',Saturn:'Saturno'};
  const aspects = [];

  // Get Moon longitude
  const moonEq = Astro.Equator('Moon', date, defaultObserver, true, true);
  const moonEcl = Astro.Ecliptic(moonEq.vec);
  const moonLon = moonEcl.elon < 0 ? moonEcl.elon + 360 : moonEcl.elon;

  const aspectTypes = [
    {name:'Conjuncion', angle:0, orb:8, symbol:'\u260C'},
    {name:'Sextil', angle:60, orb:4, symbol:'\u26B9'},
    {name:'Cuadratura', angle:90, orb:6, symbol:'\u25A1'},
    {name:'Trigono', angle:120, orb:5, symbol:'\u25B3'},
    {name:'Oposicion', angle:180, orb:8, symbol:'\u260D'},
  ];

  for (const p of planets) {
    try {
      const eq = Astro.Equator(p, date, defaultObserver, true, true);
      const ecl = Astro.Ecliptic(eq.vec);
      let pLon = ecl.elon < 0 ? ecl.elon + 360 : ecl.elon;
      let diff = Math.abs(moonLon - pLon);
      if (diff > 180) diff = 360 - diff;

      for (const a of aspectTypes) {
        if (Math.abs(diff - a.angle) <= a.orb) {
          aspects.push({
            planet: names[p],
            aspect: a.name,
            symbol: a.symbol,
            exact: Math.abs(diff - a.angle) < 1
          });
          break;
        }
      }
    } catch(e) {}
  }
  return aspects;
}

// ===========================
// LUNAR CYCLE CALCULATION
// ===========================
// A lunar cycle goes from New Moon to next New Moon
// We divide it into 4 "lunar weeks" based on phases:
// Week 1: New Moon -> First Quarter (~day 0-7.4)
// Week 2: First Quarter -> Full Moon (~day 7.4-14.8)
// Week 3: Full Moon -> Last Quarter (~day 14.8-22.1)
// Week 4: Last Quarter -> New Moon (~day 22.1-29.5)

let currentCycleOffset = 0;

function getCycleData(offset) {
  const today = new Date();
  let refDate = today;

  // Navigate cycles
  if (offset !== 0) {
    let nm = findPreviousNewMoon(today);
    for (let i = 0; i < Math.abs(offset); i++) {
      if (offset > 0) {
        nm = findNextNewMoon(new Date(nm.getTime() + 2 * 86400000));
      } else {
        nm = findPreviousNewMoon(new Date(nm.getTime() - 2 * 86400000));
      }
    }
    refDate = new Date(nm.getTime() + 86400000);
  }

  const cycleStart = findPreviousNewMoon(refDate);
  const cycleEnd = findNextNewMoon(new Date(cycleStart.getTime() + 2 * 86400000));
  const cycleDays = Math.round((cycleEnd - cycleStart) / 86400000);

  // Find quarter phases
  const firstQ = Astro.SearchMoonPhase(90, cycleStart, 40);
  const fullM = Astro.SearchMoonPhase(180, cycleStart, 40);
  const lastQ = Astro.SearchMoonPhase(270, cycleStart, 40);

  // Build days array
  const days = [];
  for (let i = 0; i < cycleDays; i++) {
    const d = new Date(cycleStart.getTime() + i * 86400000);
    d.setHours(12, 0, 0, 0);
    const zodiac = getMoonZodiac(d);
    const illum = getMoonIllumination(d);
    const aspects = getPlanetaryAspects(d);
    const isToday = d.toDateString() === today.toDateString();
    days.push({ date: d, lunarDay: i + 1, zodiac, illumination: illum, aspects, isToday });
  }

  // Divide into lunar weeks
  const phases = [
    {
      name: 'Luna Nueva',
      emoji: '\u{1F311}',
      start: cycleStart,
      end: firstQ?.date || new Date(cycleStart.getTime() + 7 * 86400000),
      sign: null
    },
    {
      name: 'Cuarto Creciente',
      emoji: '\u{1F313}',
      start: firstQ?.date || new Date(cycleStart.getTime() + 7 * 86400000),
      end: fullM?.date || new Date(cycleStart.getTime() + 15 * 86400000),
      sign: null
    },
    {
      name: 'Luna Llena',
      emoji: '\u{1F315}',
      start: fullM?.date || new Date(cycleStart.getTime() + 15 * 86400000),
      end: lastQ?.date || new Date(cycleStart.getTime() + 22 * 86400000),
      sign: null
    },
    {
      name: 'Cuarto Menguante',
      emoji: '\u{1F317}',
      start: lastQ?.date || new Date(cycleStart.getTime() + 22 * 86400000),
      end: cycleEnd,
      sign: null
    }
  ];

  // Assign days to phases
  for (const phase of phases) {
    phase.days = days.filter(d => d.date >= phase.start && d.date < phase.end);
    if (phase.days.length > 0) {
      phase.sign = phase.days[0].zodiac;
    }
  }

  // Full moon name
  const fullMoonDate = fullM?.date || new Date(cycleStart.getTime() + 15 * 86400000);
  const month = fullMoonDate.getMonth();
  const fullMoonNames = ['Luna del Lobo','Luna de Nieve','Luna del Gusano','Luna Rosada','Luna de Flores','Luna de Fresa','Luna del Ciervo','Luna del Esturion','Luna de la Cosecha','Luna del Cazador','Luna del Castor','Luna Fria'];
  const fullMoonName = fullMoonNames[month] || 'Luna Llena';

  return {
    cycleStart, cycleEnd, cycleDays, days, phases, fullMoonName,
    fullMoonDate, firstQ: firstQ?.date, lastQ: lastQ?.date
  };
}

// ===========================
// STORAGE
// ===========================
function getEntries(type) {
  return JSON.parse(localStorage.getItem('khloesmoon_' + type) || '[]');
}
function saveEntries(type, entries) {
  localStorage.setItem('khloesmoon_' + type, JSON.stringify(entries));
}
function getEntriesForDate(date) {
  const ds = date.toISOString().split('T')[0];
  const diary = getEntries('diary').filter(e => e.date === ds);
  const dreams = getEntries('dream').filter(e => e.date === ds);
  return { diary, dreams };
}

// ===========================
// RENDER CALENDAR
// ===========================
function renderCalendar() {
  const data = getCycleData(currentCycleOffset);
  const today = new Date();

  // Today card
  const age = getLunarAge(today);
  const zodiac = getMoonZodiac(today);
  const illum = getMoonIllumination(today);
  const sunZ = getSunZodiac(today);

  document.getElementById('lunarToday').innerHTML = `
    <div class="moon-visual">${getMoonEmoji(today)}</div>
    <div class="day-num">Dia ${Math.floor(age) + 1}</div>
    <div class="day-label">${getMoonPhaseName(today)} &bull; ${zodiac.symbol} ${zodiac.name} ${zodiac.degree}&deg;</div>
    <div class="moon-info">
      <span>${illum.toFixed(1)}% iluminada</span>
      <span>Sol en ${sunZ.symbol} ${sunZ.name}</span>
    </div>
  `;

  // Header
  document.getElementById('headerMoon').textContent = getMoonEmoji(today);
  document.getElementById('headerPhase').textContent = `Dia ${Math.floor(age) + 1}`;

  // Cycle label
  const opts = { day: 'numeric', month: 'short' };
  document.getElementById('cycleLabel').innerHTML = `
    ${data.fullMoonName}<br>
    <span style="font-size:11px;color:var(--text-dim)">${data.cycleStart.toLocaleDateString('es-ES', opts)} - ${data.cycleEnd.toLocaleDateString('es-ES', opts)} &bull; ${data.cycleDays} dias</span>
  `;

  // Grid
  const grid = document.getElementById('calendarGrid');
  const weekdays = ['dom','lun','mar','mie','jue','vie','sab'];
  const allEntries = [...getEntries('diary'), ...getEntries('dream')];

  grid.innerHTML = data.phases.map(phase => {
    if (!phase.days.length) return '';
    const startStr = phase.days[0].date.toLocaleDateString('es-ES', opts);
    const endStr = phase.days[phase.days.length - 1].date.toLocaleDateString('es-ES', opts);
    const signStr = phase.sign ? `${phase.sign.symbol} ${phase.sign.name}` : '';

    return `
      <div class="lunar-phase-row">
        <div class="phase-header">
          <div class="phase-name">${phase.emoji} ${phase.name}</div>
          <div class="phase-dates">${phase.days.length}d &bull; ${startStr} - ${endStr}</div>
          <div class="phase-sign">${signStr}</div>
        </div>
        <div class="phase-days">
          ${phase.days.map(d => {
            const ds = d.date.toISOString().split('T')[0];
            const hasEntry = allEntries.some(e => e.date === ds);
            const hasAspect = d.aspects.length > 0;
            return `
              <div class="lunar-day ${d.isToday ? 'today' : ''} ${hasAspect ? 'has-aspect' : ''} ${hasEntry ? 'has-entry' : ''}"
                   onclick="openDayDetail('${ds}',${d.lunarDay})">
                <div class="ld-num">${d.lunarDay}</div>
                <div class="ld-greg">${d.date.getDate()}/${d.date.getMonth()+1}</div>
                <div class="ld-weekday">${weekdays[d.date.getDay()]}</div>
                <div class="ld-aspect"></div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function changeCycle(dir) {
  currentCycleOffset += dir;
  renderCalendar();
}

// ===========================
// DAY DETAIL MODAL
// ===========================
function openDayDetail(dateStr, lunarDay) {
  const date = new Date(dateStr + 'T12:00:00');
  const zodiac = getMoonZodiac(date);
  const illum = getMoonIllumination(date);
  const phase = getMoonPhaseName(date);
  const aspects = getPlanetaryAspects(date);
  const entries = getEntriesForDate(date);
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };

  let html = `
    <h3>${getMoonEmoji(date)} Dia Lunar ${lunarDay}</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">${date.toLocaleDateString('es-ES', opts)}</p>
    <div class="detail-row"><span class="label">Fase</span><span>${phase}</span></div>
    <div class="detail-row"><span class="label">Signo</span><span>${zodiac.symbol} ${zodiac.name} ${zodiac.degree}&deg;</span></div>
    <div class="detail-row"><span class="label">Iluminacion</span><span>${illum.toFixed(1)}%</span></div>
  `;

  if (aspects.length) {
    html += `<div style="margin-top:10px"><p style="font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600">ASPECTOS</p>`;
    for (const a of aspects) {
      html += `<div class="detail-row"><span>${a.symbol}</span><span>Luna ${a.aspect} ${a.planet} ${a.exact ? '(exacto)' : ''}</span></div>`;
    }
    html += `</div>`;
  }

  // Show entries for this day
  if (entries.diary.length || entries.dreams.length) {
    html += `<div style="margin-top:12px;border-top:1px solid var(--surface2);padding-top:10px">`;
    for (const e of entries.diary) {
      html += `<div style="font-size:13px;color:var(--accent);margin-bottom:4px;cursor:pointer" onclick="editEntry('diary','${e.id}')">&#128221; ${escapeHtml(e.title)}</div>`;
    }
    for (const e of entries.dreams) {
      html += `<div style="font-size:13px;color:var(--accent2);margin-bottom:4px;cursor:pointer" onclick="editEntry('dream','${e.id}')">&#128164; ${escapeHtml(e.title)}</div>`;
    }
    html += `</div>`;
  }

  html += `
    <div class="actions">
      <button class="btn-journal" onclick="closeDayModal();openEditor('diary','${dateStr}')">Escribir en diario</button>
      <button class="btn-dream" onclick="closeDayModal();openEditor('dream','${dateStr}')">Anotar sue&ntilde;o</button>
    </div>
  `;

  document.getElementById('dayModalContent').innerHTML = html;
  document.getElementById('dayModal').classList.add('show');
}

function closeDayModal() {
  document.getElementById('dayModal').classList.remove('show');
}

// ===========================
// RENDER ENTRIES
// ===========================
function renderEntries(type) {
  const entries = getEntries(type);
  const list = document.getElementById(type === 'diary' ? 'diaryList' : 'dreamsList');

  if (!entries.length) {
    const emoji = type === 'diary' ? '&#128221;' : '&#128164;';
    const txt = type === 'diary' ? 'No hay entradas en el diario' : 'No hay sue&ntilde;os registrados';
    list.innerHTML = `<div class="empty-state"><div class="emoji">${emoji}</div><p>${txt}</p><p style="font-size:13px;margin-top:6px">Pulsa + para crear una entrada</p></div>`;
    return;
  }

  const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
  const opts = { weekday: 'short', day: 'numeric', month: 'short' };

  list.innerHTML = sorted.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    const zodiac = getMoonZodiac(d);
    const age = getLunarAge(d);
    return `
      <div class="entry-card" onclick="editEntry('${type}','${e.id}')">
        <div class="entry-date">
          ${d.toLocaleDateString('es-ES', opts)}
          <span class="entry-lunar">${getMoonEmoji(d)} Dia ${Math.floor(age)+1} &bull; ${zodiac.symbol} ${zodiac.name}</span>
        </div>
        <div class="entry-title">${escapeHtml(e.title)}</div>
        <div class="entry-preview">${escapeHtml(e.content.substring(0, 100))}</div>
        ${e.mood ? `<div class="entry-mood">${e.mood}</div>` : ''}
      </div>
    `;
  }).join('');
}

function filterEntries(type, query) {
  const entries = getEntries(type);
  const list = document.getElementById(type === 'diary' ? 'diaryList' : 'dreamsList');
  const q = query.toLowerCase();

  if (!q) { renderEntries(type); return; }

  const filtered = entries.filter(e =>
    e.title.toLowerCase().includes(q) || e.content.toLowerCase().includes(q)
  );

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><p>Sin resultados para "${escapeHtml(query)}"</p></div>`;
    return;
  }

  const opts = { weekday: 'short', day: 'numeric', month: 'short' };
  list.innerHTML = filtered.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    return `
      <div class="entry-card" onclick="editEntry('${type}','${e.id}')">
        <div class="entry-date">${d.toLocaleDateString('es-ES', opts)}</div>
        <div class="entry-title">${escapeHtml(e.title)}</div>
        <div class="entry-preview">${escapeHtml(e.content.substring(0, 100))}</div>
        ${e.mood ? `<div class="entry-mood">${e.mood}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ===========================
// EDITOR
// ===========================
let editorType = 'diary';
let editorEntryId = null;
let editorDate = null;
let selectedMood = '';

const moods = ['\u{1F60A}','\u{1F60C}','\u{1F914}','\u{1F622}','\u{1F621}','\u{1F634}','\u{2728}','\u{1F31F}','\u{1F525}','\u{1F4AA}','\u{1F64F}','\u{2764}\uFE0F'];
const dreamMoods = ['\u{1F4AB}','\u{1F30C}','\u{1F30A}','\u{1F525}','\u{1F47B}','\u{1F985}','\u{1F332}','\u{1F30D}','\u{2728}','\u{1F6E4}\uFE0F','\u{1F3E0}','\u{1F47E}'];

function openEditor(type, dateStr, entryId) {
  editorType = type;
  editorEntryId = entryId || null;
  editorDate = dateStr || new Date().toISOString().split('T')[0];
  selectedMood = '';

  const d = new Date(editorDate + 'T12:00:00');
  const zodiac = getMoonZodiac(d);
  const age = getLunarAge(d);

  document.getElementById('editorLunarTag').innerHTML = `${getMoonEmoji(d)} Dia ${Math.floor(age)+1} &bull; ${zodiac.symbol} ${zodiac.name}`;
  document.getElementById('moodLabel').textContent = type === 'diary' ? 'Estado de animo' : 'Simbolo del sue\u00f1o';

  // Mood picker
  const moodSet = type === 'diary' ? moods : dreamMoods;
  document.getElementById('moodPicker').innerHTML = moodSet.map(m =>
    `<button onclick="selectMood(this,'${m}')">${m}</button>`
  ).join('');

  if (entryId) {
    const entries = getEntries(type);
    const entry = entries.find(e => e.id === entryId);
    if (entry) {
      document.getElementById('editorTitle').value = entry.title;
      document.getElementById('editorContent').value = entry.content;
      selectedMood = entry.mood || '';
      if (selectedMood) {
        const btns = document.querySelectorAll('.mood-picker button');
        btns.forEach(b => { if (b.textContent === selectedMood) b.classList.add('selected'); });
      }
      document.getElementById('deleteEntryBtn').style.display = 'block';
    }
  } else {
    document.getElementById('editorTitle').value = '';
    document.getElementById('editorContent').value = '';
    document.getElementById('deleteEntryBtn').style.display = 'none';
  }

  document.getElementById('editorOverlay').classList.add('show');
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('show');
  stopDictation();
}

function selectMood(btn, mood) {
  document.querySelectorAll('.mood-picker button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMood = mood;
}

function saveEntry() {
  const title = document.getElementById('editorTitle').value.trim();
  const content = document.getElementById('editorContent').value.trim();
  if (!title && !content) return;

  const entries = getEntries(editorType);

  if (editorEntryId) {
    const idx = entries.findIndex(e => e.id === editorEntryId);
    if (idx >= 0) {
      entries[idx].title = title || 'Sin titulo';
      entries[idx].content = content;
      entries[idx].mood = selectedMood;
    }
  } else {
    entries.push({
      id: Date.now().toString(),
      date: editorDate,
      title: title || 'Sin titulo',
      content,
      mood: selectedMood,
      createdAt: new Date().toISOString()
    });
  }

  saveEntries(editorType, entries);
  closeEditor();
  renderEntries(editorType);
  renderCalendar();
}

function editEntry(type, id) {
  const entries = getEntries(type);
  const entry = entries.find(e => e.id === id);
  if (entry) {
    closeDayModal();
    openEditor(type, entry.date, entry.id);
  }
}

function deleteEntry() {
  if (!editorEntryId) return;
  if (!confirm('Eliminar esta entrada?')) return;
  let entries = getEntries(editorType);
  entries = entries.filter(e => e.id !== editorEntryId);
  saveEntries(editorType, entries);
  closeEditor();
  renderEntries(editorType);
  renderCalendar();
}

// ===========================
// SPEECH RECOGNITION (DICTATION)
// ===========================
let recognition = null;
let isRecording = false;

function toggleDictation() {
  if (isRecording) { stopDictation(); return; }

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Tu navegador no soporta dictado por voz. Prueba con Chrome.');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = true;
  recognition.interimResults = true;

  const textarea = document.getElementById('editorContent');
  const startText = textarea.value;

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    textarea.value = startText + (startText ? ' ' : '') + transcript;
  };

  recognition.onerror = () => stopDictation();
  recognition.onend = () => { if (isRecording) { try { recognition.start(); } catch(e) { stopDictation(); } } };

  recognition.start();
  isRecording = true;
  document.getElementById('dictateBtn').classList.add('recording');
  document.getElementById('dictateBtn').innerHTML = `
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    Grabando... (toca para parar)
  `;
}

function stopDictation() {
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  isRecording = false;
  const btn = document.getElementById('dictateBtn');
  if (btn) {
    btn.classList.remove('recording');
    btn.innerHTML = `
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      Dictar
    `;
  }
}

// ===========================
// NAVIGATION
// ===========================
function switchView(btn) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(btn.dataset.view).classList.add('active');

  if (btn.dataset.view === 'diaryView') renderEntries('diary');
  if (btn.dataset.view === 'dreamsView') renderEntries('dream');
  if (btn.dataset.view === 'calendarView') renderCalendar();
}

// ===========================
// UTILS
// ===========================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ===========================
// SERVICE WORKER
// ===========================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ===========================
// INIT
// ===========================
renderCalendar();
</script>
